<style>

body{font-family:system-ui,-apple-system,sans-serif;background:#f5f4f0;color:#1a1a1a;font-size:14px}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit;font-size:13px}
:root{

  --gray:#5F5E5A;--gray-bg:#F1EFE8;
}
.ifield{border:0.5px solid var(--border-medium);border-radius:8px;padding:7px 10px;font-size:13px;background:var(--bg-primary);color:var(--text-primary);outline:none;width:100%}
.ifield:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(24,95,165,0.12)}

.pbtn:hover{opacity:.9}
.obtn{background:none;border:0.5px solid var(--border-medium);border-radius:8px;padding:8px 16px;color:var(--text-primary);font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
.obtn:hover{background:var(--bg-secondary)}
.card{background:var(--bg-primary);border-radius:12px;border:0.5px solid var(--border-light)}
.tag{display:inline-flex;align-items:center;gap:4px;border-radius:4px;padding:2px 7px;font-size:11px;font-weight:500;white-space:nowrap}
.ov{position:fixed;inset:0;background:rgba(0,0,0,0.48);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px}
.mbox{background:var(--bg-primary);border-radius:12px;width:100%;max-height:92vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.mh{padding:14px 20px;border-bottom:0.5px solid var(--border-light);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg-primary);z-index:10}
.ib{background:none;border:0.5px solid var(--border-light);border-radius:8px;padding:5px 8px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:4px;color:var(--text-primary)}
.nav-btn{display:flex;align-items:center;gap:6px;padding:6px 12px;border:none;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;background:none;color:var(--text-secondary);position:relative}
.nav-btn:hover{background:var(--bg-secondary);color:var(--text-primary)}
.nav-btn.active{background:var(--blue-bg);color:var(--blue)}
header{background:var(--bg-primary);border-bottom:0.5px solid var(--border-light);padding:0 22px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px rgba(0,0,0,0.06);flex-wrap:wrap;gap:8px}
main{padding:18px 22px;max-width:1100px;margin:0 auto}
.toast{position:fixed;top:18px;right:18px;z-index:999;background:var(--green-bg);border:0.5px solid var(--green);border-radius:10px;padding:13px 20px;display:flex;align-items:center;gap:10px;box-shadow:0 4px 20px rgba(0,0,0,0.12);max-width:380px;animation:slideIn .25s ease}
@keyframes slideIn{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
.loader{position:fixed;inset:0;background:rgba(255,255,255,0.92);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.spinner{width:40px;height:40px;border:3px solid var(--blue-bg);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#3B6D11;display:inline-block;margin-left:6px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.bar-wrap{display:flex;height:22px;border-radius:5px;overflow:hidden;background:var(--bg-secondary)}
.bar-seg{display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:500}

function todayStr(){const n=new Date();return`${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`}
function dStr(y,m,d){return`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`}
function fmt(d){if(!d)return'';const[y,m,dd]=d.split('-');return`${dd}/${m}/${y}`}
function calcAge(dob){if(!dob)return'';const b=new Date(dob),t=new Date();let a=t.getFullYear()-b.getFullYear();if(t<new Date(t.getFullYear(),b.getMonth(),b.getDate()))a--;return`${a} anos`}
function addMin(hhmm,mn){const[hh,m]=hhmm.split(':').map(Number);const tt=hh*60+m+mn;return`${String(Math.floor(tt/60)).padStart(2,'0')}:${String(tt%60).padStart(2,'0')}`}
function salaById(week,id){return Object.values(week).flatMap(d=>d.salas).find(s=>s.id===id)}
function tipoCir(week,p){const s=salaById(week,p.sala);return s?s.tipo:null}
function genSlots(ds,patients,week){
  const dow=new Date(ds).getDay(),wc=week[dow];
  if(!wc||!wc.ativa||FERIADOS[ds])return[];
  const out=[];
  wc.ass.forEach(a=>{
    wc.salas.filter(s=>a.salas.includes(s.id)&&s.ativa).forEach(sala=>{
      const ocup=patients.filter(p=>p.dataCir===ds&&p.sala===sala.id&&p.status==='agendado').map(p=>p.hora);
      let hora=a.ini||'07:00';
      for(let i=0;i<a.max;i++){out.push({sala,ass:a,hora,livre:!ocup.includes(hora)});hora=addMin(hora,a.dur||90)}
    });
  });
  return out;
}

// ── FIREBASE HOOKS ──
function useFirebase(){
  const [ready,setReady]=useState(!!window._db);
  useEffect(()=>{
    if(window._db){setReady(true);return}
    function f(){setReady(true)}
    window.addEventListener('firebase-ready',f);
    return()=>window.removeEventListener('firebase-ready',f);
  },[]);
  return ready;
}

function usePatients(ready){
  const [patients,setPatients]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!ready)return;
    const {collection,onSnapshot}=window._fb;
    const unsub=onSnapshot(collection(window._db,'patients'),(snap)=>{
      const ps=[];snap.forEach(d=>ps.push({id:d.id,...d.data()}));
      setPatients(ps);setLoaded(true);
    });
    return unsub;
  },[ready]);
  return{patients,loaded};
}

function useWeekConfig(ready){
  const [week,setWeek]=useState(WEEK_INIT);
  useEffect(()=>{
    if(!ready)return;
    const {doc,onSnapshot}=window._fb;
    const unsub=onSnapshot(doc(window._db,'config','week'),(snap)=>{
      if(snap.exists()){
        try{const d=snap.data();if(d&&d.week)setWeek(JSON.parse(d.week));}catch(e){}
      }
    });
    return unsub;
  },[ready]);
  return week;
}

async function savePaciente(p){
  const {doc,setDoc}=window._fb;
  await setDoc(doc(window._db,'patients',p.id),p);
}
async function deletePaciente(id){
  const {doc,deleteDoc}=window._fb;
  await deleteDoc(doc(window._db,'patients',id));
}
async function saveWeek(week){
  const {doc,setDoc}=window._fb;
  await setDoc(doc(window._db,'config','week'),{week:JSON.stringify(week)});
}
async function saveFavorito(fav){
  const {doc,setDoc}=window._fb;
  await setDoc(doc(window._db,'favoritos',fav.id),fav);
}
async function deleteFavorito(id){
  const {doc,deleteDoc}=window._fb;
  await deleteDoc(doc(window._db,'favoritos',id));
}
function useFavoritos(ready){
  const [favs,setFavs]=useState([]);
  const [loaded,setLoaded]=useState(false);
  useEffect(()=>{
    if(!ready)return;
    const {collection,onSnapshot}=window._fb;
    const unsub=onSnapshot(collection(window._db,'favoritos'),(snap)=>{
      const fs=[];snap.forEach(d=>fs.push({id:d.id,...d.data()}));
      fs.sort((a,b)=>a.nome.localeCompare(b.nome));
      setFavs(fs);setLoaded(true);
    });
    return unsub;
  },[ready]);
  return{favs,loaded};
}

function HistBadge({hist}){

  const handleSavePac=async(f)=>{
    const isNew=!f.id;
    const p={...f,id:f.id||'p'+Date.now(),incl:f.incl||todayStr(),assId:f.assId||'',assNome:f.assNome||'',hist:f.hist||[{d:todayStr(),de:null,para:'pendente'}],aviso:f.aviso||newAviso(f.proc)};
    await savePaciente(p);setModalPac(false);setEditPac(null);
    showToast(isNew?`${p.nome} adicionado.`:`${p.nome} atualizado.`);
  };
  const handleDeletePac=async(id)=>{await deletePaciente(id);showToast('Paciente removido.')};
  const handleSaveAviso=async(av)=>{
    const updated={...avisoPac,aviso:av};
    await savePaciente(updated);setModalAviso(false);setAvisoPac(null);
    showToast('Aviso cirúrgico salvo.');
  };
  const handleConfirmAg=async(pac,agDate,agSlot)=>{
    const updated={...pac,status:'agendado',dataCir:agDate,sala:agSlot.sala.id,assId:agSlot.ass.id,assNome:agSlot.ass.nome,hora:agSlot.hora,hist:[...(pac.hist||[]),{d:todayStr(),de:pac.status,para:'agendado'}]};
    await savePaciente(updated);setAgendando(null);setView('patients');
    showToast(`${pac.nome} agendado para ${fmt(agDate)} às ${agSlot.hora}`);
  };

  const nav=[
    {id:'dashboard',icon:'ti-layout-dashboard',label:'Painel'},
    {id:'patients',icon:'ti-users',label:'Pacientes'},
    {id:'calendar',icon:'ti-calendar',label:'Calendário'},
    {id:'relatorio',icon:'ti-report-medical',label:'Relatório'},
    {id:'favoritos',icon:'ti-star',label:'Favoritos'},
    {id:'config',icon:'ti-settings',label:'Configurar'},
  ];

  if(!fbReady||!loaded||!favsLoaded)return h('div',{className:'loader'},h('div',{className:'spinner'}),h('p',{style:{fontSize:14,color:'var(--text-secondary)',fontWeight:500}},'Conectando ao banco de dados...'));

  return h('div',{style:{minHeight:'100vh',display:'flex',flexDirection:'column'}},
    toast&&h('div',{className:'toast'},h('i',{className:'ti ti-circle-check',style:{color:'#3B6D11',fontSize:22,flexShrink:0}}),h('p',{style:{fontSize:13,color:'#27500A',fontWeight:500}},toast)),
    h('header',null,
      h('div',{style:{display:'flex',alignItems:'center',gap:10}},
        h('div',{style:{width:32,height:32,borderRadius:8,background:'#185FA5',display:'flex',alignItems:'center',justifyContent:'center'}},h('i',{className:'ti ti-stethoscope',style:{color:'#fff',fontSize:16}})),
        h('div',null,
          h('div',{style:{display:'flex',alignItems:'center',gap:7}},h('p',{style:{fontSize:14,fontWeight:500}},'Cirurgias Urológicas – HMVSC'),h('span',{className:'sync-dot',title:'Sincronizado em tempo real'})),
          h('p',{style:{fontSize:11,color:'var(--text-secondary)'}},'Sincronizado em tempo real · Município de São Paulo'))),
      h('nav',{style:{display:'flex',gap:3,flexWrap:'wrap'}},nav.map(n=>h('button',{key:n.id,onClick:()=>setView(n.id),className:`nav-btn${view===n.id?' active':''}`,style:{position:'relative'}},
        h('i',{className:`ti ${n.icon}`,style:{fontSize:14}}),n.label,
        n.id==='calendar'&&agendando&&h('span',{style:{position:'absolute',top:4,right:4,width:7,height:7,borderRadius:'50%',background:'#185FA5',border:'2px solid var(--bg-primary)'}}),
        n.id==='favoritos'&&favs.length>0&&h('span',{style:{position:'absolute',top:4,right:4,background:'#854F0B',color:'#fff',borderRadius:'10px',fontSize:9,padding:'1px 5px',fontWeight:600}},favs.length)
      )))
    ),
    h('main',null,
      view==='dashboard'?h(Dashboard,{patients,week,dispatch:({view:v,tab:t})=>{if(v)setView(v);if(t){setTab(t);setView('patients');}}}):
      view==='patients'?h(PacView,{patients,week,tab,fStatus,fPrio,busca,dispatch:({tab:t,fStatus:fs,fPrio:fp,busca:b})=>{if(t)setTab(t);if(fs!==undefined)setFStatus(fs);if(fp!==undefined)setFPrio(fp);if(b!==undefined)setBusca(b)},onStatus:handleStatus,onEdit:(p)=>{setEditPac(p);setModalPac(true)},onDelete:handleDeletePac,onAviso:(p)=>{setAvisoPac(p);setModalAviso(true)}}):
      view==='calendar'?h(CalView,{patients,week,agendando,setAgendando,calMes,calAno,setCalMes,setCalAno,selDate,setSelDate,onConfirmAg:handleConfirmAg}):
      view==='relatorio'?h(RelView,{patients,week,repMes,repAno,setRepMes,setRepAno}):
      view==='favoritos'?h(FavoritosView,{favs,onToast:showToast}):
      h(ConfigView,{week,setWeek})
    ),
    modalPac&&h(PacModal,{pac:editPac,defCat:tab,onSave:handleSavePac,onClose:()=>{setModalPac(false);setEditPac(null)}}),
    modalAviso&&avisoPac&&h(AvisoModal,{pac:avisoPac,favs,onSave:handleSaveAviso,onClose:()=>{setModalAviso(false);setAvisoPac(null)}})
  );
}

const domNode = document.getElementById('app');
const root = ReactDOM.createRoot(domNode);
root.render(React.createElement(App));
</script>
</body>
</html>
